{% extends "layout.html" %}

{% block content %}
<h1>My Profile</h1>
<p>Update your personal info and fitness goals.</p>

<div class="card">
    <form action="/profile/update" method="POST">
        <div class="form-group">
            <label for="display_name">Display Name</label>
            <input type="text" id="display_name" name="display_name"
                   value="{{ user['display_name'] or '' }}"
                   placeholder="Enter your name">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="height">Height (cm)</label>
                <input type="number" id="height" name="height" step="0.1"
                       value="{{ user['height'] or '' }}"
                       placeholder="e.g. 175">
            </div>
            <div class="form-group">
                <label for="weight">Weight (kg)</label>
                <input type="number" id="weight" name="weight" step="0.1"
                       value="{{ user['weight'] or '' }}"
                       placeholder="e.g. 70">
            </div>
            <div class="form-group">
                <label for="age">Age</label>
                <input type="number" id="age" name="age"
                       value="{{ user['age'] or '' }}"
                       placeholder="e.g. 25">
            </div>
        </div>

        <div class="form-group">
            <label for="goal">Fitness Goal</label>
            <select id="goal" name="goal">
                <option value="">-- Select a goal --</option>
                <option value="weight_loss" {{ "selected" if user["goal"] == "weight_loss" }}>Weight Loss</option>
                <option value="muscle_gain" {{ "selected" if user["goal"] == "muscle_gain" }}>Muscle Gain</option>
                <option value="endurance" {{ "selected" if user["goal"] == "endurance" }}>Endurance</option>
                <option value="general" {{ "selected" if user["goal"] == "general" }}>General Fitness</option>
            </select>
        </div>

        <div class="form-group">
            <label for="fitness_level">Fitness Level</label>
            <select id="fitness_level" name="fitness_level">
                <option value="beginner" {{ "selected" if user["fitness_level"] == "beginner" }}>Beginner</option>
                <option value="intermediate" {{ "selected" if user["fitness_level"] == "intermediate" }}>Intermediate</option>
                <option value="advanced" {{ "selected" if user["fitness_level"] == "advanced" }}>Advanced</option>
            </select>
        </div>

        <button type="submit">Save Profile</button>
    </form>
</div>
{% endblock %}
